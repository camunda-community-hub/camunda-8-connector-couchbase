# ── Local Camunda 8 Run ──────────────────────────────────────────────────────
# Start Camunda 8 Run first, then run LocalConnectorRuntime.main() from your IDE
camunda:
  client:
    mode: simple
    zeebe:
      grpc-address: http://localhost:26500
      rest-address: http://localhost:8080

