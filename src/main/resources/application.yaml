
# ═══════════════════════════════════════════════════════════════════════════════
# LOCAL DEV HARNESS ONLY — used by LocalConnectorRuntime to run the connector
# against a local or test Camunda cluster without deploying to Kubernetes.
# This file is NOT read by the production connector runtime (connectors-bundle).
# Production config is supplied via environment variables or an externally
# mounted application.yaml. Do NOT replace these placeholder values with real
# credentials — use environment variables or a secrets manager instead.
# ═══════════════════════════════════════════════════════════════════════════════
camunda:
  client:
    mode: self-managed
    # --- AKS cluster (direct HTTPS — no k9s port-forward needed) ---
    grpc-address: https://camunda.local
    rest-address: https://camunda.local/orchestration
    tenant-id: "<default>"
    auth:
      method: oidc
      client-id: orchestration
      client-secret: demo
      issuer-url: https://camunda.local/auth/realms/camunda-platform
      audience: orchestration
    execution-threads: 128
    worker:
      defaults:
        stream-enabled: true
        max-jobs-active: 128
        request-timeout: PT20S
